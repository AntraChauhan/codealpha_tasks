{% extends "base.html" %}
{% block title %}Edit Post - SocialConnect{% endblock %}

{% block content %}
<div class="create-post-card">
    <div class="page-title">✏ Edit Post</div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label" style="font-size:13px;font-weight:600;color:var(--text-muted);">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger" style="font-size:12px;margin-top:4px;">{{ field.errors.as_text }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'posts:home' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
